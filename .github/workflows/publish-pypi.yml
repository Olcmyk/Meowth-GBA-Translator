name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test-pypi:
        description: 'Publish to TestPyPI instead of PyPI'
        required: false
        type: boolean
        default: true

jobs:
  build-and-publish:
    name: Build and publish Python package
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize submodules
        run: |
          git submodule update --init HexManiacAdvance
          git submodule update --init Pokemon_GBA_Font_Patch
          git submodule update --init armips
          git submodule update --init pokeapi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package size
        run: |
          echo "=== Package size check ==="
          ls -lh dist/
          echo ""
          echo "=== Wheel size ==="
          du -h dist/*.whl
          echo ""
          echo "=== Source distribution size ==="
          du -h dist/*.tar.gz
          echo ""
          echo "=== Verifying no binaries in package ==="
          tar -tzf dist/*.tar.gz | grep -E "MeowthBridge" && echo "❌ ERROR: Binaries found in package!" || echo "✅ No binaries found (correct)"
          unzip -l dist/*.whl | grep -E "MeowthBridge" && echo "❌ ERROR: Binaries found in wheel!" || echo "✅ No binaries found (correct)"

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.test-pypi
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Publish to PyPI
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.test-pypi)
        uses: pypa/gh-action-pypi-publish@release/v1
