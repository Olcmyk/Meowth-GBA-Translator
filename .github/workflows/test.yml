name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Initialize submodules
        run: |
          git submodule update --init HexManiacAdvance
          git submodule update --init Pokemon_GBA_Font_Patch
          git submodule update --init armips
          git submodule update --init pokeapi

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build MeowthBridge
        shell: bash
        run: |
          dotnet build src/MeowthBridge -c Release

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check imports
        run: |
          python -c "from meowth.core import TranslationEngine, TranslationConfig, TranslationCallbacks; print('Core imports OK')"
          python -c "from meowth.binaries import find_meowth_bridge; print('Binary loader imports OK')"
          python -c "from meowth.i18n import Messages; print('I18n imports OK')"

      - name: Test binary loader
        run: |
          python -c "from meowth.binaries.loader import find_meowth_bridge, get_binary_info; info = get_binary_info(); print(f'Binary info: {info}'); assert info['exists'], 'MeowthBridge not found'"

      - name: Test CLI
        run: |
          python -m meowth --help
          python -m meowth extract --help
          python -m meowth translate --help
          python -m meowth build --help
          python -m meowth full --help

      - name: Run pytest (if tests exist)
        run: |
          if [ -d "tests" ]; then
            pytest -v
          else
            echo "No tests directory found, skipping pytest"
          fi
        shell: bash
        continue-on-error: true
