name: Build MeowthBridge

on:
  workflow_call:
    outputs:
      artifact-name:
        description: "Name of the artifacts containing binaries"
        value: meowth-bridge-binaries
  workflow_dispatch:
  push:
    paths:
      - 'src/MeowthBridge/**'
      - '.github/workflows/build-csharp.yml'

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Prepare resources for MeowthBridge
        run: |
          New-Item -ItemType Directory -Force -Path resources
          Copy-Item -Path "HexManiacAdvance\src\HexManiac.Core\Models\Code\*.toml" -Destination resources\
          Copy-Item -Path "HexManiacAdvance\src\HexManiac.Core\Models\Code\*.txt" -Destination resources\
          Copy-Item -Path "HexManiacAdvance\src\HexManiac.Core\Models\Code\*.py" -Destination resources\

      - name: Build MeowthBridge
        run: |
          dotnet publish src/MeowthBridge `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=false `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o build/windows
          Copy-Item -Recurse -Path resources -Destination build\windows\

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: meowth-bridge-windows
          path: build/windows/
          retention-days: 7

  build-macos:
    name: Build for macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Prepare resources for MeowthBridge
        run: |
          mkdir -p resources
          cp HexManiacAdvance/src/HexManiac.Core/Models/Code/*.toml resources/
          cp HexManiacAdvance/src/HexManiac.Core/Models/Code/*.txt resources/
          cp HexManiacAdvance/src/HexManiac.Core/Models/Code/*.py resources/

      - name: Build MeowthBridge (x64)
        run: |
          dotnet publish src/MeowthBridge \
            -c Release \
            -r osx-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o build/macos-x64

      - name: Build MeowthBridge (arm64)
        run: |
          dotnet publish src/MeowthBridge \
            -c Release \
            -r osx-arm64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o build/macos-arm64

      - name: Create universal binary
        run: |
          mkdir -p build/macos
          # Copy all files from arm64 build
          cp -r build/macos-arm64/* build/macos/
          # Create universal binary for the main executable
          lipo -create \
            build/macos-x64/MeowthBridge \
            build/macos-arm64/MeowthBridge \
            -output build/macos/MeowthBridge
          chmod +x build/macos/MeowthBridge
          # Copy resources to MeowthBridge directory
          cp -r resources build/macos/

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: meowth-bridge-macos
          path: build/macos/
          retention-days: 7

  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Prepare resources for MeowthBridge
        run: |
          mkdir -p resources
          cp HexManiacAdvance/src/HexManiac.Core/Models/Code/*.toml resources/
          cp HexManiacAdvance/src/HexManiac.Core/Models/Code/*.txt resources/
          cp HexManiacAdvance/src/HexManiac.Core/Models/Code/*.py resources/

      - name: Build MeowthBridge
        run: |
          dotnet publish src/MeowthBridge \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o build/linux
          cp -r resources build/linux/

      - name: Make executable
        run: chmod +x build/linux/MeowthBridge

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: meowth-bridge-linux
          path: build/linux/
          retention-days: 7

  combine-artifacts:
    name: Combine all binaries
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    steps:
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: meowth-bridge-windows
          path: binaries/windows

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: meowth-bridge-macos
          path: binaries/macos

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: meowth-bridge-linux
          path: binaries/linux

      - name: List binaries
        run: |
          echo "=== Windows ==="
          ls -lh binaries/windows/
          echo "Windows resources:"
          ls -la binaries/windows/resources/ || echo "No resources dir"
          echo ""
          echo "=== macOS ==="
          ls -lh binaries/macos/
          echo "macOS resources:"
          ls -la binaries/macos/resources/ || echo "No resources dir"
          echo ""
          echo "=== Linux ==="
          ls -lh binaries/linux/
          echo "Linux resources:"
          ls -la binaries/linux/resources/ || echo "No resources dir"

      - name: Upload combined binaries
        uses: actions/upload-artifact@v4
        with:
          name: meowth-bridge-binaries
          path: binaries/
          retention-days: 30

  upload-to-release:
    name: Upload binaries to Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write  # Required to upload files to release
    steps:
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: meowth-bridge-windows
          path: binaries/windows

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: meowth-bridge-macos
          path: binaries/macos

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: meowth-bridge-linux
          path: binaries/linux

      - name: Create standalone executables
        run: |
          # Windows - single file executable
          cp binaries/windows/MeowthBridge.exe MeowthBridge-windows.exe

          # macOS - universal binary (single file)
          cp binaries/macos/MeowthBridge MeowthBridge-macos
          chmod +x MeowthBridge-macos

          # Linux - single file executable
          cp binaries/linux/MeowthBridge MeowthBridge-linux
          chmod +x MeowthBridge-linux

          # Verify files
          ls -lh MeowthBridge-*
          echo ""
          echo "File sizes (should be 40-80 MB each with PublishSingleFile):"
          du -h MeowthBridge-*

      - name: Upload Windows binary to Release
        uses: softprops/action-gh-release@v1
        with:
          files: MeowthBridge-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS binary to Release
        uses: softprops/action-gh-release@v1
        with:
          files: MeowthBridge-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux binary to Release
        uses: softprops/action-gh-release@v1
        with:
          files: MeowthBridge-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
