name: Build GUI App

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-binaries:
    name: Build C# binaries
    uses: ./.github/workflows/build-csharp.yml
    permissions:
      contents: write  # Required for upload-to-release job

  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    needs: build-binaries
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller customtkinter Pillow click httpx

      - name: Download MeowthBridge binary
        uses: actions/download-artifact@v4
        with:
          name: meowth-bridge-macos
          path: src/meowth/binaries/macos/

      - name: Verify downloaded MeowthBridge structure
        run: |
          echo "=== MeowthBridge binary structure ==="
          ls -la src/meowth/binaries/macos/
          echo ""
          echo "=== Resources directory ==="
          ls -la src/meowth/binaries/macos/resources/ || echo "ERROR: resources directory not found!"
          echo ""
          echo "=== Check critical files ==="
          test -f src/meowth/binaries/macos/resources/hma.py && echo "✓ hma.py found" || echo "✗ hma.py MISSING!"
          test -f src/meowth/binaries/macos/resources/default.toml && echo "✓ default.toml found" || echo "✗ default.toml MISSING!"

      - name: Make MeowthBridge executable
        run: chmod +x src/meowth/binaries/macos/MeowthBridge

      - name: Build armips
        run: |
          cd armips
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release
          mkdir -p ../../tools
          cp armips ../../tools/armips
          chmod +x ../../tools/armips

      - name: Prepare glossary directory
        run: mkdir -p resources

      - name: Pre-build glossary JSON files
        run: |
          PYTHONPATH=src python -c "
          from meowth.glossary import Glossary
          from meowth.languages import SUPPORTED_LANGUAGES
          import json
          from pathlib import Path

          for target in SUPPORTED_LANGUAGES:
              if target == 'en':
                  continue
              g = Glossary(source_lang='en', target_lang=target)
              data = {'source_to_target': g.source_to_target}
              out = Path('resources') / f'glossary_en_{target}.json'
              out.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding='utf-8')
              print(f'Generated {out} ({len(g.source_to_target)} terms)')
          "
          ls -la resources/glossary_*.json

      - name: Get customtkinter path
        id: ctk
        run: |
          CTK_PATH=$(python -c "import customtkinter; import os; print(os.path.dirname(customtkinter.__file__))")
          echo "path=$CTK_PATH" >> $GITHUB_OUTPUT

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --name "Meowth Translator" \
            --windowed \
            --onedir \
            --add-data "src/meowth:meowth" \
            --add-data "resources:resources" \
            --add-data "pokeapi/data/v2/csv:pokeapi/data/v2/csv" \
            --add-data "Pokemon_GBA_Font_Patch:Pokemon_GBA_Font_Patch" \
            --add-data "tools:tools" \
            --hidden-import customtkinter \
            --hidden-import PIL \
            --hidden-import click \
            --hidden-import httpx \
            --collect-all customtkinter \
            launcher.py

      - name: Create DMG
        run: |
          # Clean up any existing files from previous runs
          rm -rf dmg_content
          rm -f "dist/Meowth-Translator-macOS.dmg"

          # Create DMG
          mkdir -p dmg_content
          cp -r "dist/Meowth Translator.app" dmg_content/
          ln -s /Applications dmg_content/Applications
          hdiutil create -volname "Meowth Translator" \
            -srcfolder dmg_content \
            -ov -format UDZO \
            "dist/Meowth-Translator-macOS.dmg"

      - name: Upload macOS App
        uses: actions/upload-artifact@v4
        with:
          name: meowth-translator-macos
          path: dist/Meowth-Translator-macOS.dmg
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Meowth-Translator-macOS.dmg

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    needs: build-binaries
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller customtkinter Pillow click httpx

      - name: Download MeowthBridge binary
        uses: actions/download-artifact@v4
        with:
          name: meowth-bridge-windows
          path: src/meowth/binaries/windows/

      - name: Verify downloaded MeowthBridge structure
        shell: bash
        run: |
          echo "=== MeowthBridge binary structure ==="
          ls -la src/meowth/binaries/windows/
          echo ""
          echo "=== Resources directory ==="
          ls -la src/meowth/binaries/windows/resources/ || echo "ERROR: resources directory not found!"
          echo ""
          echo "=== Check critical files ==="
          test -f src/meowth/binaries/windows/resources/hma.py && echo "✓ hma.py found" || echo "✗ hma.py MISSING!"
          test -f src/meowth/binaries/windows/resources/default.toml && echo "✓ default.toml found" || echo "✗ default.toml MISSING!"

      - name: Setup MSVC for armips
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build armips
        shell: bash
        run: |
          cd armips
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release
          mkdir -p ../../tools
          cp Release/armips.exe ../../tools/armips.exe

      - name: Prepare glossary directory
        shell: bash
        run: mkdir -p resources

      - name: Pre-build glossary JSON files
        shell: bash
        run: |
          PYTHONPATH=src python -c "
          from meowth.glossary import Glossary
          from meowth.languages import SUPPORTED_LANGUAGES
          import json
          from pathlib import Path

          for target in SUPPORTED_LANGUAGES:
              if target == 'en':
                  continue
              g = Glossary(source_lang='en', target_lang=target)
              data = {'source_to_target': g.source_to_target}
              out = Path('resources') / f'glossary_en_{target}.json'
              out.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding='utf-8')
              print(f'Generated {out} ({len(g.source_to_target)} terms)')
          "
          ls -la resources/glossary_*.json

      - name: Get customtkinter path
        id: ctk
        shell: bash
        run: |
          CTK_PATH=$(python -c "import customtkinter; import os; print(os.path.dirname(customtkinter.__file__))")
          echo "path=$CTK_PATH" >> $GITHUB_OUTPUT

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller \
            --name "Meowth Translator" \
            --windowed \
            --onedir \
            --add-data "src/meowth;meowth" \
            --add-data "resources;resources" \
            --add-data "pokeapi/data/v2/csv;pokeapi/data/v2/csv" \
            --add-data "Pokemon_GBA_Font_Patch;Pokemon_GBA_Font_Patch" \
            --add-data "tools;tools" \
            --hidden-import customtkinter \
            --hidden-import PIL \
            --hidden-import click \
            --hidden-import httpx \
            --collect-all customtkinter \
            launcher.py

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\Meowth Translator" -DestinationPath "dist\Meowth-Translator-Windows.zip"

      - name: Upload Windows App
        uses: actions/upload-artifact@v4
        with:
          name: meowth-translator-windows
          path: dist/Meowth-Translator-Windows.zip
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Meowth-Translator-Windows.zip
